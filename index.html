<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Arcade</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      padding: 2rem;
    }

    main {
      text-align: center;
      max-width: 520px;
      width: 100%;
      border: 2px solid #0af;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 30px rgba(0, 170, 255, 0.2), inset 0 0 40px rgba(0, 170, 255, 0.05);
    }

    h1 {
      font-size: clamp(1rem, 4vw, 1.6rem);
      color: #fff;
      text-shadow: 0 0 12px #0af;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    p.sub {
      font-size: clamp(0.45rem, 2vw, 0.6rem);
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .games {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    a.game-link {
      display: block;
      padding: 1.2rem 1rem;
      text-decoration: none;
      color: #000;
      background: #0f0;
      border: 2px solid #0f0;
      font-size: clamp(0.5rem, 2.2vw, 0.7rem);
      box-shadow: 0 0 14px rgba(0, 255, 0, 0.4);
      transition: all 0.15s;
      line-height: 1.6;
    }

    a.game-link:hover {
      background: #ff0;
      border-color: #ff0;
      box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
      transform: scale(1.03);
    }

    a.game-link span {
      display: block;
      color: #333;
      font-size: 0.85em;
      margin-top: 0.4rem;
    }

    footer {
      margin-top: 2rem;
      font-size: clamp(0.4rem, 1.8vw, 0.5rem);
      color: #555;
      line-height: 1.8;
    }

    footer a {
      color: #0af;
    }
  </style>
</head>
<body>
  <main>
    <h1>RETRO ARCADE</h1>
    <p class="sub">BROWSER GAMES / NO INSTALL</p>

    <nav class="games">
      <a class="game-link" href="asteroids.html">
        ASTEROIDS
        <span>ベクター風 + パワーアップ</span>
      </a>
      <a class="game-link" href="missile-command.html">
        MISSILE COMMAND
        <span>基地防衛シューティング</span>
      </a>
    </nav>

    <footer>
      <a href="https://github.com/cookinglifehack-png/retro-browser-arcade-games">GitHub</a> でソース公開中
    </footer>
  </main>
</body>
</html>
